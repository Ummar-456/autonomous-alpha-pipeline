version: "3.9"

# ── Autonomous Alpha Pipeline — Full Observability Stack ──────────────────────
#
# Services:
#   pipeline    — The Python asyncio pipeline (LOB → LangGraph → SRE)
#   prometheus  — Scrapes /metrics from pipeline:8000 every 5s
#   grafana     — Pre-configured dashboards provisioned from ./grafana/
#
# Quick start:
#   docker compose up --build
#   Open http://localhost:3000 (admin/admin) → Alpha Pipeline dashboard

services:

  pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: alpha-pipeline
    restart: unless-stopped
    ports:
      - "8000:8000"      # Prometheus metrics endpoint
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: alpha-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - observability
    depends_on:
      - pipeline

  grafana:
    image: grafana/grafana:10.4.2
    container_name: alpha-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/alpha_pipeline.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - observability
    depends_on:
      - prometheus

networks:
  observability:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
