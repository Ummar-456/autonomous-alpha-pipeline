name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install langgraph langchain-core langchain-anthropic anthropic websockets pydantic pydantic-settings prometheus-client httpx structlog pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          PYTHONPATH=src pytest tests/ -v --tb=short
